events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # HTTP server for CA cert download
    server {
        listen 80;
        server_name _;

        location /mkcert-ca.crt {
            root /usr/share/nginx/html;
            add_header Content-Type application/x-x509-ca-cert;
        }

        location /install-ca-windows.ps1 {
            root /usr/share/nginx/html;
            add_header Content-Type text/plain;
        }

        location /install-ca.sh {
            root /usr/share/nginx/html;
            add_header Content-Type text/plain;
        }

        location /ssl-setup.html {
            root /usr/share/nginx/html;
        }

        location /favicon.svg {
            root /usr/share/nginx/html;
            add_header Content-Type image/svg+xml;
        }

        location = / {
            return 301 /ssl-setup.html;
        }

        location / {
            return 301 https://$host:4321$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Serve UI files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy health endpoint
        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}